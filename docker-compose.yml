services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production

  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
